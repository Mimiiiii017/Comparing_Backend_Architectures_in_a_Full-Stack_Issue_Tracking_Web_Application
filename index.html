<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visa to Vows — Case Tracker</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=2"/>
<link rel="shortcut icon" type="image/png" href="favicon.png?v=2"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #edf4ff;
    --surface:   #f8fbff;
    --surface2:  #e9f0fb;
    --border:    #c7d6ea;
    --text:      #18283f;
    --muted:     #4f6482;
    --accent:    #2f6db5;
    --accent2:   #5b97de;
    --focus-ring:#5b97de33;
    --shadow:    0 8px 28px rgba(18,39,68,0.12);
    --font-sans: 'Plus Jakarta Sans', sans-serif;
    --font-serif:'Fraunces', serif;
  }
  [data-theme="dark"] {
    --bg:        #1d2430;
    --surface:   #2b3445;
    --surface2:  #354155;
    --border:    #4a5b73;
    --text:      #eef4ff;
    --muted:     #c6d3e9;
    --accent:    #7eb6ff;
    --accent2:   #5c93dc;
    --focus-ring:#7eb6ff3d;
    --shadow:    0 10px 28px rgba(6,10,20,0.34);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    background-image: radial-gradient(circle at 12% 0%, rgba(91,151,222,0.2), transparent 38%), radial-gradient(circle at 95% 8%, rgba(47,109,181,0.14), transparent 30%);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  [data-theme="dark"] body {
    background-image: radial-gradient(circle at 12% 0%, rgba(126,182,255,0.2), transparent 38%), radial-gradient(circle at 95% 8%, rgba(92,147,220,0.16), transparent 32%);
  }
  body::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(91,151,222,0.17) 0%, transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(47,109,181,0.12) 0%, transparent 70%);
    bottom: -50px; left: -50px;
    pointer-events: none;
  }
  [data-theme="dark"] body::before { background: radial-gradient(circle, rgba(126,182,255,0.18) 0%, transparent 70%); }
  [data-theme="dark"] body::after  { background: radial-gradient(circle, rgba(92,147,220,0.15) 0%, transparent 70%); }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 44px;
    width: 100%; max-width: 420px;
    box-shadow: var(--shadow);
    position: relative; z-index: 1;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .vtv-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .logo-mark {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif); font-weight: 700; font-size: 17px;
    color: white; flex-shrink: 0;
  }
  .logo-text h1 { font-family: var(--font-serif); font-size: 20px; font-weight: 700; line-height: 1.1; }
  .logo-text p  { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
  .login-card h2 { font-family: var(--font-serif); font-size: 26px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.03em; }
  .field input {
    width: 100%; padding: 12px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; font-family: var(--font-sans);
    color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
  .login-error {
    background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .btn-primary {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; font-family: var(--font-sans);
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px;
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(47,109,181,0.38); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    display: none; flex-shrink: 0;
  }
  .spinner.visible { display: block; }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; font-size: 14px;
    cursor: pointer; color: var(--text); z-index: 10;
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">☀︎</button>

<div class="login-card">
  <div class="vtv-logo">
    <div class="logo-mark">VTV</div>
    <div class="logo-text">
      <h1>Visa to Vows</h1>
      <p>Case Tracker Platform</p>
    </div>
  </div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in to access the case dashboard.</p>
  <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
  <div class="field">
    <label>PASSWORD</label>
    <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password"/>
  </div>
  <button class="btn-primary" id="loginBtn" onclick="doLogin()">
    <span class="spinner" id="loginSpinner"></span>
    <span id="loginBtnLabel">Sign In</span>
  </button>
</div>

<script>
  // Restore theme
  const saved = localStorage.getItem('vtv-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '☾' : '☀︎';

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.querySelector('.theme-toggle').textContent = isDark ? '☀︎' : '☾';
    localStorage.setItem('vtv-theme', isDark ? 'light' : 'dark');
  }

  // Check if already logged in
  fetch('/api/me', { credentials: 'include' })
    .then(r => r.ok ? r.json() : null)
    .then(d => { if (d?.role) window.location.href = '/dashboard'; })
    .catch(() => {});

  async function doLogin() {
    const pw = document.getElementById('passwordInput').value.trim();
    if (!pw) return;

    const btn     = document.getElementById('loginBtn');
    const spinner = document.getElementById('loginSpinner');
    const label   = document.getElementById('loginBtnLabel');
    btn.disabled = true;
    spinner.classList.add('visible');
    label.textContent = 'Signing in…';

    try {
      const fd = new FormData();
      fd.append('password', pw);
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `password=${encodeURIComponent(pw)}`,
        credentials: 'include',
      });

      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        document.getElementById('loginError').style.display = 'block';
        btn.disabled = false;
        spinner.classList.remove('visible');
        label.textContent = 'Sign In';
      }
    } catch {
      document.getElementById('loginError').style.display = 'block';
      btn.disabled = false;
      spinner.classList.remove('visible');
      label.textContent = 'Sign In';
    }
  }

  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
